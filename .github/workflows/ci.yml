name: Full Stack CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB:       index_todo_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore
        run: dotnet restore backend/iNdex.Todo.sln

      - name: Build
        run: dotnet build backend/iNdex.Todo.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/iNdex.Todo.sln --no-build -c Release --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: >-
            Host=localhost;Port=5432;Database=index_todo_test;Username=postgres;Password=postgres

  # ── Mobile (Android build check) ────────────────────────────────────────────
  mobile-android:
    name: Mobile — Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore mobile/iNdex.Todo.Mobile.sln

      - name: Build
        run: |
          dotnet build mobile/src/iNdex.Todo.Mobile/iNdex.Todo.Mobile.csproj \
            -f net10.0-android \
            -c Debug \
            --no-restore

  # ── Docker build check ───────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t index-todo-api:ci \
            ./backend
