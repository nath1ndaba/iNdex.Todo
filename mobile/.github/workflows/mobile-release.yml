name: Mobile Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore iNdex.Todo.Mobile.sln

      - name: Publish Android APK (Release)
        run: |
          dotnet publish src/iNdex.Todo.Mobile/iNdex.Todo.Mobile.csproj \
            -f net10.0-android \
            -c Release \
            -p:AndroidKeyStore=false \
            --no-restore

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: src/iNdex.Todo.Mobile/bin/Release/net10.0-android/publish/*.apk

  release-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore
        run: dotnet restore iNdex.Todo.Mobile.sln

      - name: Publish Windows MSIX
        run: |
          dotnet publish src/iNdex.Todo.Mobile/iNdex.Todo.Mobile.csproj `
            -f net10.0-windows10.0.19041.0 `
            -c Release `
            --no-restore

      - name: Upload MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-msix
          path: src/iNdex.Todo.Mobile/bin/Release/net10.0-windows10.0.19041.0/publish/**/*.msix
