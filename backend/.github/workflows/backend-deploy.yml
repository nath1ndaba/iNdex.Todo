name: Backend Deploy

on:
  push:
    branches: [publish]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT:       true

jobs:
  deploy:
    name: Publish & Deploy API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore iNdex.Todo.sln

      - name: Build (Release)
        run: dotnet build iNdex.Todo.sln --no-restore -c Release

      - name: Publish API
        run: |
          dotnet publish src/iNdex.Todo.API/iNdex.Todo.API.csproj \
            -c Release \
            -o ./publish \
            --no-build \
            --no-restore

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t index-todo-api:${{ github.sha }} \
            -t index-todo-api:latest \
            .

      # ── Uncomment and configure one of the deploy targets below ─────────────

